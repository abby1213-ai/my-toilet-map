<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>廁所位置地圖系統 (終極流暢版)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* 移除手機點擊時的藍色高亮陰影 */
}

body {
    margin:0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

#map { 
    height: 100vh; 
    flex-grow: 1;
    z-index: 1;
}

/* 左側控制面板 */
.panel{
    position:absolute;
    top:15px;
    left:15px;
    background:white;
    padding:14px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    z-index:1000;
    width:260px;
}

/* 右側資料清單面板 */
.list-panel {
    width: 320px;
    height: 100vh;
    background: #f8f9fa;
    border-left: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    z-index: 999;
}

.list-header {
    background: #1976d2;
    color: white;
    padding: 15px;
    font-size: 16px;
    font-weight: bold;
}

.list-container {
    flex-grow: 1;
    overflow-y: auto;
    padding: 10px;
}

.toilet-item {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
}

.toilet-item:hover { background: #f0f7ff; }
.toilet-item-title { font-weight: bold; font-size: 14px; color: #333; padding-right: 30px; }
.toilet-item-tag { display: inline-block; font-size: 12px; padding: 2px 6px; border-radius: 4px; color: white; margin-top: 5px; }

.tag-男廁 { background: #1565c0; }
.tag-女廁 { background: #d32f2f; }
.tag-無障礙 { background: #2e7d32; }
.toilet-item-note { font-size: 12px; color: #666; margin-top: 5px; }

.item-delete-btn {
    position: absolute; top: 10px; right: 10px; background: none; border: none;
    color: #c62828; cursor: pointer; font-size: 14px; width: auto; margin: 0; padding: 0;
}

.no-data-text { color: #888; text-align: center; margin-top: 30px; font-size: 14px; }

/* 程式碼檢視器浮動面板樣式 */
.code-viewer-toggle {
    position: absolute;
    bottom: 20px;
    left: 15px;
    z-index: 1000;
    background: #333;
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.code-modal {
    display: none; position: fixed; top: 5vh; left: 5vw; width: 90vw; height: 90vh;
    background: #272822; z-index: 2000; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    flex-direction: column; padding: 15px;
}

.code-modal-header { display: flex; justify-content: space-between; align-items: center; color: white; margin-bottom: 10px; }
.code-modal-title { font-size: 14px; font-weight: bold; }
.code-actions { display: flex; gap: 10px; }
.code-btn { padding: 6px 12px; font-size: 13px; border-radius: 4px; border: none; cursor: pointer; }
.btn-copy { background: #a6e22e; color: #000; font-weight: bold; }
.btn-close { background: #f92672; color: #fff; }
textarea.code-area { flex-grow: 1; background: #1e1e1e; color: #f8f8f2; font-family: monospace; font-size: 12px; padding: 12px; border: 1px solid #444; border-radius: 6px; resize: none; overflow: auto; }

.title{ font-size:16px; font-weight:bold; margin-bottom:8px; }
input, select, button{ width:100%; margin-top:6px; padding:7px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
button{ background:#1976d2; color:white; border:none; cursor:pointer; }
button:hover{ background:#125aa0; }
.danger{ background:#d32f2f; }
.popup-btn { margin-top:8px; padding:4px 8px; background:#d32f2f; color:white; border:none; border-radius:4px; cursor:pointer; width:100%; }

/* 手機 RWD 排版優化 */
@media (max-width: 768px) {
    body { flex-direction: column; }
    #map { height: 55vh; width: 100%; }
    .list-panel { width: 100%; height: 45vh; border-left: none; border-top: 1px solid #ddd; }
    .panel { position: relative; top: 0; left: 0; width: 100%; border-radius: 0; box-shadow: none; border-bottom: 1px solid #ccc; padding: 10px; }
    .panel input, .panel select { display: inline-block; width: 31%; margin-top: 0; margin-right: 1%; }
    .panel button { display: inline-block; width: 100%; margin-top: 8px; }
    .code-viewer-toggle { bottom: auto; top: 10px; right: 10px; left: auto; padding: 6px 10px; font-size: 12px; }
}
</style>
</head>

<body>

<!-- 控制台 -->
<div class="panel">
    <div class="title">🚻 廁所位置地圖</div>
    <input id="name" placeholder="地點(必填)">
    <select id="type">
        <option value="男廁">男廁</option>
        <option value="女廁">女廁</option>
        <option value="無障礙">無障礙</option>
    </select>
    <input id="note" placeholder="備註(選填)">
    <button class="danger" onclick="clearAll()">🗑 清除快取重置</button>
</div>

<!-- 地圖 -->
<div id="map"></div>

<!-- 景點列表 -->
<div class="list-panel">
    <div class="list-header">📋 目前點位清單</div>
    <div class="list-container" id="listContainer"></div>
</div>

<!-- 查看程式碼按鈕 -->
<div class="code-viewer-toggle" onclick="toggleCodeModal(true)">🖥️ 複製代碼</div>

<!-- 程式碼檢視視窗 -->
<div class="code-modal" id="codeModal">
    <div class="code-modal-header">
        <div class="code-modal-title">💻 內嵌資料的 HTML 程式碼</div>
        <div class="code-actions">
            <button class="code-btn btn-copy" onclick="copyCode()">📋 複製</button>
            <button class="code-btn btn-close" onclick="toggleCodeModal(false)">關閉</button>
        </div>
    </div>
    <textarea class="code-area" id="codeTextArea" readonly></textarea>
</div>

<script>
// 禁用 Leaflet 內部與觸控衝突的舊設定，啟用原生流暢縮放
var map = L.map('map', {
    tap: false, 
    doubleClickZoom: false, // 🆕 關閉原本「雙擊放大地圖」的功能，改成拿來新增點位
    touchZoom: true
}).setView([24.7865, 121.0168], 16);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

var markers = [];
var defaultData = []; 

var localData = JSON.parse(localStorage.getItem("toilets_save") || "[]");
var saved = defaultData.concat(localData);

saved.forEach(addMarker);
updateList();
generateCurrentCode();

if(saved.length > 0) {
    map.setView([saved[0].lat, saved[0].lng], 16);
}

/* ===================================================
   🎯 終極分流：電腦用點擊、手機用雙擊（快速點兩下）
   =================================================== */

// 1. 電腦端專用：滑鼠單擊點位直接新增（拖曳移動時不會誤觸）
map.on('click', function(e) {
    // 排除手機觸控干擾
    if (e.originalEvent && (e.originalEvent.type === 'touchend' || window.innerWidth <= 768)) return; 
    handleMapClick(e.latlng);
});

// 2. 手機端專用：在螢幕上「快速連點兩下（雙擊）」新增點位
map.on('dblclick', function(e) {
    if(e.originalEvent) {
        e.originalEvent.preventDefault(); // 阻止瀏覽器預設行為
    }
    handleMapClick(e.latlng);
});

// 實際處理新增點位的核心函式
function handleMapClick(latlng) {
    let name = document.getElementById("name").value.trim();
    if(!name){
        // 為了避免干擾手機滑動，手機上沒打名字就直接忽略不跳煩人的 alert
        if(window.innerWidth > 768) {
            alert("請先在左邊輸入「店名/地點」，再點擊地圖位置新增！");
        }
        return;
    }

    let type = document.getElementById("type").value;
    let note = document.getElementById("note").value.trim();

    let data = {
        id: Date.now(),
        name,
        lat: latlng.lat,
        lng: latlng.lng,
        type,
        note
    };

    localData.push(data);
    localStorage.setItem("toilets_save", JSON.stringify(localData));
    
    saved.push(data);
    addMarker(data);
    updateList();
    generateCurrentCode();
    
    document.getElementById("name").value = "";
    document.getElementById("note").value = "";
}

/* 圖釘樣式 */
function getIcon(type){
    let color = type==="女廁" ? "#d32f2f" :
                type==="無障礙" ? "#2e7d32" : "#1565c0";

    return L.divIcon({
        html:`<div style="width:16px;height:16px;background:${color};border-radius:50%;border:2px solid white;box-shadow: 0 1px 4px rgba(0,0,0,0.3);"></div>`,
        className: '',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
    });
}

/* 刪除 */
window.deleteMarker = function(id, event){
    if(event) event.stopPropagation();
    map.closePopup();

    markers = markers.filter(m=>{
        if(m.id===id){
            map.removeLayer(m.marker);
            return false;
        }
        return true;
    });

    localData = localData.filter(l=>l.id!==id);
    localStorage.setItem("toilets_save", JSON.stringify(localData));

    saved = saved.filter(s=>s.id!==id);
    updateList();
    generateCurrentCode();
};

/* 加入標記 */
function addMarker(data){
    let marker = L.marker([data.lat, data.lng],{
        icon: getIcon(data.type)
    }).addTo(map);

    marker.bindPopup(
        `<b>${data.name}</b><br>標籤：${data.type}<br>${data.note ? '備註：' + data.note : ""}<br><button class="popup-btn" onclick="window.deleteMarker(${data.id})">刪除</button>`
    );

    markers.push({id: data.id, marker});
}

/* 更新列表 */
function updateList() {
    const container = document.getElementById("listContainer");
    container.innerHTML = "";

    if (saved.length === 0) {
        container.innerHTML = `<div class="no-data-text">📭 目前沒有資料<br>💻 電腦：單擊地圖新增<br>📱 手機：快速點兩下地圖新增</div>`;
        return;
    }

    saved.forEach(item => {
        let div = document.createElement("div");
        div.className = "toilet-item";
        div.onclick = () => {
            map.setView([item.lat, item.lng], 17);
            let targetMarker = markers.find(m => m.id === item.id);
            if(targetMarker) targetMarker.marker.openPopup();
        };

        div.innerHTML = `
            <button class="item-delete-btn" onclick="window.deleteMarker(${item.id}, event)">🗑</button>
            <div class="toilet-item-title">${item.name}</div>
            <span class="toilet-item-tag tag-${item.type}">${item.type}</span>
            ${item.note ? `<div class="toilet-item-note">📝 ${item.note}</div>` : ""}
        `;
        container.appendChild(div);
    });
}

/* 產生網頁程式碼 */
function generateCurrentCode() {
    let currentHtml = document.documentElement.outerHTML;
    let dataString = JSON.stringify(saved, null, 4);

    let updatedHtml = currentHtml.replace(
        /var defaultData = \[\s*([\s\S]*?)\s*\];/g, 
        "var defaultData = " + dataString + ";"
    );

    updatedHtml = updatedHtml.replace(/style="display: flex;"/g, 'style="display: none;"');

    let finalCode = "<!DOCTYPE html>\n" + updatedHtml;
    document.getElementById("codeTextArea").value = finalCode;
}

function toggleCodeModal(show) {
    const modal = document.getElementById("codeModal");
    if(show) {
        generateCurrentCode();
        modal.style.display = "flex";
    } else {
        modal.style.display = "none";
    }
}

function copyCode() {
    const textarea = document.getElementById("codeTextArea");
    textarea.select();
    textarea.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("🚀 程式碼已成功複製！");
}

function clearAll(){
    if(!confirm("確定清除全部資料？")) return;
    localStorage.removeItem("toilets_save");
    location.reload();
}
</script>

</body>
</html>

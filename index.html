<style>
* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: Arial, sans-serif;
    display: flex;
}

#map { 
    height: 100vh; 
    flex-grow: 1;
}

/* 左側控制面板 */
.panel{
    position:absolute;
    top:15px;
    left:15px;
    background:white;
    padding:14px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    z-index:1000;
    width:260px;
}

/* 右側資料清單面板 */
.list-panel {
    width: 320px;
    height: 100vh;
    background: #f8f9fa;
    border-left: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    z-index: 999;
}

.list-header {
    background: #1976d2;
    color: white;
    padding: 15px;
    font-size: 16px;
    font-weight: bold;
}

.list-container {
    flex-grow: 1;
    overflow-y: auto;
    padding: 10px;
}

.toilet-item {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
}

.toilet-item:hover {
    background: #f0f7ff;
}

.toilet-item-title {
    font-weight: bold;
    font-size: 14px;
    color: #333;
    padding-right: 30px;
}

.toilet-item-tag {
    display: inline-block;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    color: white;
    margin-top: 5px;
}

.tag-男廁 { background: #1565c0; }
.tag-女廁 { background: #d32f2f; }
.tag-無障礙 { background: #2e7d32; }

.toilet-item-note {
    font-size: 12px;
    color: #666;
    margin-top: 5px;
}

.item-delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    color: #c62828;
    cursor: pointer;
    font-size: 14px;
    width: auto;
    margin: 0;
    padding: 0;
}

.no-data-text {
    color: #888;
    text-align: center;
    margin-top: 30px;
    font-size: 14px;
}

/* 🆕 程式碼檢視器浮動面板樣式 */
.code-viewer-toggle {
    position: absolute;
    bottom: 20px;
    left: 15px;
    z-index: 1000;
    background: #333;
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.code-modal {
    display: none;
    position: fixed;
    top: 10vh;
    left: 10vw;
    width: 80vw;
    height: 80vh;
    background: #272822;
    z-index: 2000;
    border-radius: 12px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    flex-direction: column;
    padding: 15px;
}

.code-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    margin-bottom: 10px;
}

.code-modal-title {
    font-size: 16px;
    font-weight: bold;
}

.code-actions {
    display: flex;
    gap: 10px;
}

.code-btn {
    padding: 6px 12px;
    font-size: 13px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
}

.btn-copy { background: #a6e22e; color: #000; font-weight: bold; }
.btn-close { background: #f92672; color: #fff; }

textarea.code-area {
    flex-grow: 1;
    background: #1e1e1e;
    color: #f8f8f2;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    padding: 12px;
    border: 1px solid #444;
    border-radius: 6px;
    resize: none;
    white-space: pre;
    overflow: auto;
}

/* 通用元件微調 */
.title{ font-size:16px; font-weight:bold; margin-bottom:8px; }
input, select, button{ width:100%; margin-top:6px; padding:7px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
button{ background:#1976d2; color:white; border:none; cursor:pointer; }
button:hover{ background:#125aa0; }
.danger{ background:#d32f2f; }
.danger:hover{ background:#b71c1c; }
.popup-btn { margin-top:8px; padding:4px 8px; background:#d32f2f; color:white; border:none; border-radius:4px; cursor:pointer; width:100%; }
</style>
</head>

saved.forEach(addMarker);
updateList();
generateCurrentCode(); // 🆕 初始化時先產生一次程式碼

if(saved.length > 0) {
    map.setView([saved[0].lat, saved[0].lng], 16);
}

/* 點地圖新增 */
map.on('click', function(e){
    let name = document.getElementById("name").value.trim();
    if(!name){
        alert("請先在左邊輸入「店名/地點」，再點擊地圖位置新增！");
        return;
    }

    let type = document.getElementById("type").value;
    let note = document.getElementById("note").value.trim();

    let data = {
        id: Date.now(),
        name,
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        type,
        note
    };

    localData.push(data);
    localStorage.setItem("toilets_save", JSON.stringify(localData));
    
    saved.push(data);
    addMarker(data);
    updateList();
    generateCurrentCode(); // 🆕 資料變動，即時更新程式碼內容
    
    document.getElementById("name").value = "";
    document.getElementById("note").value = "";
});

/* 圖釘樣式 */
function getIcon(type){
    let color = type==="女廁" ? "#d32f2f" :
                type==="無障礙" ? "#2e7d32" : "#1565c0";

    return L.divIcon({
        html:`<div style="width:16px;height:16px;background:${color};border-radius:50%;border:2px solid white;box-shadow: 0 1px 4px rgba(0,0,0,0.3);"></div>`,
        className: '',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
    });
}

/* 刪除 */
window.deleteMarker = function(id, event){
    if(event) event.stopPropagation();
    map.closePopup();

    markers = markers.filter(m=>{
        if(m.id===id){
            map.removeLayer(m.marker);
            return false;
        }
        return true;
    });

    localData = localData.filter(l=>l.id!==id);
    localStorage.setItem("toilets_save", JSON.stringify(localData));

    saved = saved.filter(s=>s.id!==id);
    updateList();
    generateCurrentCode(); // 🆕 資料變動，即時更新程式碼內容
};

/* 加入標記 */
function addMarker(data){
    let marker = L.marker([data.lat, data.lng],{
        icon: getIcon(data.type)
    }).addTo(map);

    marker.bindPopup(
        `<b>${data.name}</b><br>標籤：${data.type}<br>${data.note ? '備註：' + data.note : ""}<br><button class="popup-btn" onclick="window.deleteMarker(${data.id})">刪除</button>`
    );

    markers.push({id: data.id, marker});
}

/* 更新列表 */
function updateList() {
    const container = document.getElementById("listContainer");
    container.innerHTML = "";

    if (saved.length === 0) {
        container.innerHTML = `<div class="no-data-text">📭 目前沒有點位資料<br>請點擊地圖新增</div>`;
        return;
    }

    saved.forEach(item => {
        let div = document.createElement("div");
        div.className = "toilet-item";
        div.onclick = () => {
            map.setView([item.lat, item.lng], 17);
            let targetMarker = markers.find(m => m.id === item.id);
            if(targetMarker) targetMarker.marker.openPopup();
        };

        div.innerHTML = `
            <button class="item-delete-btn" onclick="window.deleteMarker(${item.id}, event)">🗑</button>
            <div class="toilet-item-title">${item.name}</div>
            <span class="toilet-item-tag tag-${item.type}">${item.type}</span>
            ${item.note ? `<div class="toilet-item-note">📝 ${item.note}</div>` : ""}
        `;
        container.appendChild(div);
    });
}

/* 🆕 核心：抓取當前網頁，並組合出包含新點位的完整程式碼 */
function generateCurrentCode() {
    // 取得目前整個網頁的 HTML 外殼
    let currentHtml = document.documentElement.outerHTML;

    // 將資料轉成格式化漂亮的 JSON 字串
    let dataString = JSON.stringify(saved, null, 4);

    // 用正規表達式把網頁裡的 `var defaultData = [
    {
        "id": 1779626154326,
        "name": "星巴克",
        "lat": 24.790752407359395,
        "lng": 121.01352453231813,
        "type": "無障礙",
        "note": "可能須低消"
    },
    {
        "id": 1779626178545,
        "name": "露易莎",
        "lat": 24.790426112844592,
        "lng": 121.01486563682558,
        "type": "無障礙",
        "note": "可能須低消"
    },
    {
        "id": 1779628085708,
        "name": "711",
        "lat": 24.789866053094514,
        "lng": 121.01342260837556,
        "type": "無障礙",
        "note": ""
    },
    {
        "id": 1779628101815,
        "name": "全家",
        "lat": 24.788828718357237,
        "lng": 121.0123497247696,
        "type": "無障礙",
        "note": ""
    },
    {
        "id": 1779628185692,
        "name": "711",
        "lat": 24.79173615577673,
        "lng": 121.01159870624544,
        "type": "無障礙",
        "note": ""
    },
    {
        "id": 1779628209733,
        "name": "全家",
        "lat": 24.790547864629602,
        "lng": 121.0102951526642,
        "type": "無障礙",
        "note": "2樓"
    }
];` 換成最新有資料的狀態
    let updatedHtml = currentHtml.replace(
        /var defaultData = \[\s*([\s\S]*?)\s*\];/g, 
        "var defaultData = " + dataString + ";"
    );

    // 順便把彈出視窗跟文字框本身在原始碼裡的狀態清空，確保新網頁開起來時是乾淨的
    updatedHtml = updatedHtml.replace(/style="display: none;"/g, 'style="display: none;"');

    let finalCode = "<!DOCTYPE html>\n" + updatedHtml;
    document.getElementById("codeTextArea").value = finalCode;
}

/* 🆕 控制彈出視窗顯示/隱藏 */
function toggleCodeModal(show) {
    const modal = document.getElementById("codeModal");
    if(show) {
        generateCurrentCode(); // 打開時再次重新整理確保最新
        modal.style.display = "flex";
    } else {
        modal.style.display = "none";
    }
}

/* 🆕 一鍵複製功能 */
function copyCode() {
    const textarea = document.getElementById("codeTextArea");
    textarea.select();
    document.execCommand("copy");
    alert("🚀 程式碼已成功複製到剪貼簿！您可以直接開一個新的空白檔案貼上了！");
}

/* 清除快取 */
function clearAll(){
    if(!confirm("確定清除本地快取？")) return;
    localStorage.removeItem("toilets_save");
    location.reload();
}
</script>
